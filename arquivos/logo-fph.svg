<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <!-- Mark: architectural floor-plan symbol -->
  <rect x="2" y="2" width="36" height="36" stroke="currentColor" stroke-width="1.5"/>
  <polyline points="2,38 20,12 38,38" stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>
  <line x1="2" y1="2" x2="38" y2="38" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3 3" opacity="0.4"/>
  <!-- Separator -->
  <line x1="50" y1="8" x2="50" y2="32" stroke="currentColor" stroke-width="0.75" opacity="0.35"/>
  <!-- Wordmark: FPH -->
  <text x="60" y="17" font-family="'Cormorant Garamond', Georgia, serif" font-size="13" font-weight="600" letter-spacing="0.18em" fill="currentColor">FPH</text>
  <text x="60" y="31" font-family="'Inter', sans-serif" font-size="7.5" font-weight="400" letter-spacing="0.28em" fill="currentColor" opacity="0.7">ESTÚDIO</text>
</svg>
